<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invite | Consolify</title>
    <style>
      :root {
        --font-title: 2rem;
        --font-code: 1.5rem;
        --font-button: 1rem;
        --font-platform: 1rem;
        --code-padding-x: 1.5rem;
        --code-padding-y: 1rem;
        --copy-width: 5.5rem;
      }

      @media (max-width: 640px) {
        :root {
          --font-title: 1.5rem;
          --font-code: 1.125rem;
          --font-button: 0.75rem;
          --font-platform: 0.75rem;
          --code-padding-x: 1.125rem;
          --code-padding-y: 0.75rem;
          --copy-width: 4.125rem;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      * {
        padding: 0;
        margin: 0;
      }

      button {
        -webkit-appearance: none;
        border-radius: 0;
        text-align: inherit;
        background: none;
        box-shadow: none;
        padding: 0;
        cursor: pointer;
        border: none;
        color: inherit;
        font: inherit;
      }

      body {
        font-family: monospace;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: hsl(0 0 10);
        background-image: linear-gradient(135deg, hsl(0 0% 10%), hsl(0 0% 5%));
        color: white;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.1;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='4' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      }

      #content {
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        text-align: center;
      }

      #title {
        font-size: var(--font-title);
      }

      #username {
        color: hsl(120 100% 75%);
      }

      #code-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: var(--code-padding-y);
        padding: var(--code-padding-y) var(--code-padding-x);
        background: hsl(0 0% 20%);
        border-radius: 9999px;
        font-size: var(--font-code);
      }

      #copy-button {
        margin-right: -0.5rem;
        width: var(--copy-width);
        padding: 0.5rem 0rem;
        background: hsl(120 100% 75%);
        color: black;
        border-radius: 9999px;
        font-size: var(--font-button);
      }

      #platform {
        font-size: var(--font-platform);
        color: hsl(0, 0%, 80%);
      }
    </style>
  </head>
  <body>
    <div id="content">
      <h1 id="title">
        <span id="username">Loading...</span> &mdash; Friend Code
      </h1>

      <div id="code-container">
        <span id="code">Loading...</span>
        <button id="copy-button" onclick="onCopy()">Copy</button>
      </div>

      <span id="platform">Loading...</span>
    </div>

    <script>
      const platforms = {
        'nintendo-switch': 'Nintendo Switch',
      };

      const usernameElement = document.getElementById('username');
      const platformElement = document.getElementById('platform');
      const codeElement = document.getElementById('code');
      const copyButton = document.getElementById('copy-button');

      const params = new URLSearchParams(window.location.search);

      const getParam = (key, fallback, map = null) => {
        const value = params.get(key)?.trim();

        return {
          value: map ? (map[value] ?? fallback) : (value ?? fallback),
          isFallback: !value,
        };
      };

      const data = {
        username: getParam('username', 'Unknown User'),
        platform: getParam('platform', 'Unknown Platform', platforms),
        code: getParam('code', 'Unknown Code'),
      };

      usernameElement.textContent = data.username.value;
      if (data.username.isFallback) {
        usernameElement.style.color = 'hsl(0 100% 75%)';
      }

      platformElement.textContent = data.platform.value;

      codeElement.textContent = data.code.value;
      if (data.code.isFallback) {
        codeElement.style.color = 'hsl(0 100% 75%)';
        copyButton.disabled = true;
        copyButton.style.background = 'hsl(0 100% 75% / 50%)';
        copyButton.style.cursor = 'not-allowed';
      }

      let copyTimeout;

      const onCopy = () => {
        navigator.clipboard.writeText(data.code.value).then(() => {
          copyButton.textContent = 'Copied!';

          copyTimeout && clearTimeout(copyTimeout);

          copyTimeout = setTimeout(() => {
            copyButton.textContent = 'Copy';
          }, 2000);
        });
      };
    </script>
  </body>
</html>
